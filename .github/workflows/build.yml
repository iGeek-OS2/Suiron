name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Build (no signing)
        run: |
          xcodebuild build \
            -project Suiron.xcodeproj \
            -scheme Suiron \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Repack as IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Debug-iphoneos/Suiron.app Payload/
          zip -r Suiron.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Suiron-unsigned
          path: Suiron.ipa
          retention-days: 30
