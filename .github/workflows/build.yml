name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Build (no signing)
        run: |
          xcodebuild build \
            -project Suiron.xcodeproj \
            -scheme Suiron \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty || xcodebuild build \
              -project Suiron.xcodeproj \
              -scheme Suiron \
              -configuration Debug \
              -destination 'generic/platform=iOS Simulator' \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO
